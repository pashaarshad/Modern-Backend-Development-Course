
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Age Registry</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .output-box {
      max-height: 500px;
      overflow-y: auto;
      margin-top: 20px;
    }

    .data-card {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 5px solid #3b82f6;
    }

    .data-card p {
      margin: 5px 0;
    }

    .success {
      color: #22c55e;
      margin-top: 15px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LEFT SIDE FORM -->
    <div class="card">
      <h1>Age Registry</h1>

      <div class="input-group">
        <label>Enter Your Name</label>
        <input type="text" id="name" placeholder="Enter your name">
      </div>

      <div class="input-group">
        <label>Enter Your Age</label>
        <input type="number" id="age" placeholder="Enter your age">
      </div>

      <button id="saveBtn">Save Data</button>

      <p class="success" id="message"></p>
    </div>

    <!-- RIGHT SIDE OUTPUT -->
    <div class="card">
      <h1>See All Details</h1>

      <button id="loadBtn">See All Output</button>

      <div class="output-box" id="output"></div>
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBTfOcgLriTKmevYoaO2jD-qqoGbqvF6qM",
      authDomain: "test-class2.firebaseapp.com",
      projectId: "test-class2",
      storageBucket: "test-class2.firebasestorage.app",
      messagingSenderId: "515971697307",
      appId: "1:515971697307:web:402899e8e99f35fd5f543e",
      measurementId: "G-2W30D7V6JV"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    // Initialize Firestore
    const db = getFirestore(app);

    // HTML Elements
    const saveBtn = document.getElementById("saveBtn");
    const loadBtn = document.getElementById("loadBtn");
    const output = document.getElementById("output");
    const message = document.getElementById("message");

    // SAVE DATA TO FIREBASE
    saveBtn.addEventListener("click", async () => {

      const name = document.getElementById("name").value;
      const age = document.getElementById("age").value;

      if(name === "" || age === "") {
        alert("Please fill all fields");
        return;
      }

      try {

        await addDoc(collection(db, "ageRegistry"), {
          name: name,
          age: age,
          createdAt: serverTimestamp()
        });

        message.innerText = "Data Saved Successfully!";

        document.getElementById("name").value = "";
        document.getElementById("age").value = "";

      } catch(error) {
        console.error(error);
        alert("Error saving data");
      }
    });

    // LOAD DATA FROM FIREBASE
    loadBtn.addEventListener("click", async () => {

      output.innerHTML = "";

      try {

        const querySnapshot = await getDocs(collection(db, "ageRegistry"));

        querySnapshot.forEach((doc) => {

          const data = doc.data();

          output.innerHTML += `
            <div class="data-card">
              <p><strong>Name:</strong> ${data.name}</p>
              <p><strong>Age:</strong> ${data.age}</p>
            </div>
          `;
        });

      } catch(error) {
        console.error(error);
        alert("Error fetching data");
      }
    });

  </script>

</body>
</html>
```
