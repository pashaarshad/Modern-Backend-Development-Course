<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Firebase Phone OTP Verification</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f2f5f9;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:350px;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.15);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:12px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:15px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:6px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    #recaptcha-container{
      margin-top:15px;
      display:flex;
      justify-content:center;
    }

    #result{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>Phone OTP Verification</h2>

    <input
      type="text"
      id="phone"
      placeholder="+91XXXXXXXXXX"
    />

    <button onclick="sendOTP()">
      Send OTP
    </button>

    <div id="recaptcha-container"></div>

    <input
      type="text"
      id="otp"
      placeholder="Enter OTP"
    />

    <button onclick="verifyOTP()">
      Verify OTP
    </button>

    <div id="result"></div>

  </div>


  <script type="module">

    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";



    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAlIuzhG1K0zEqF8c7dWvY9yr-214yEpm8",
      authDomain: "class-2and3.firebaseapp.com",
      projectId: "class-2and3",
      storageBucket: "class-2and3.firebasestorage.app",
      messagingSenderId: "956789513098",
      appId: "1:956789513098:web:e4948646a14f3def9f0673",
      measurementId: "G-98GPMFW3B2"
    };


    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    const analytics = getAnalytics(app);

    const auth = getAuth(app);



    // Setup reCAPTCHA
    window.recaptchaVerifier = new RecaptchaVerifier(
      auth,
      'recaptcha-container',
      {
        size: 'normal',
        callback: (response) => {
          console.log("reCAPTCHA Solved");
        }
      }
    );

    // Render reCAPTCHA
    window.recaptchaVerifier.render();



    // Send OTP
    window.sendOTP = async function () {

      const phoneNumber =
        document.getElementById("phone").value;

      const appVerifier =
        window.recaptchaVerifier;

      try {

        const confirmationResult =
          await signInWithPhoneNumber(
            auth,
            phoneNumber,
            appVerifier
          );

        window.confirmationResult =
          confirmationResult;

        document.getElementById("result").innerHTML =
          "<span style='color:green;'>OTP Sent Successfully!</span>";

      }

      catch (error) {

        console.error(error);

        document.getElementById("result").innerHTML =
          "<span style='color:red;'>" +
          error.message +
          "</span>";
      }
    };



    // Verify OTP
    window.verifyOTP = async function () {

      const code =
        document.getElementById("otp").value;

      try {

        const result =
          await window.confirmationResult.confirm(code);

        const user = result.user;

        console.log(user);

        document.getElementById("result").innerHTML =
          "<span style='color:green;'>Phone Verified Successfully!</span>";

      }

      catch (error) {

        console.error(error);

        document.getElementById("result").innerHTML =
          "<span style='color:red;'>Invalid OTP</span>";
      }
    };

  </script>

</body>
</html>
