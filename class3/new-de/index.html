<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    }

    .container{
      width:380px;
      background:white;
      border-radius:20px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      text-align:center;
    }

    .logo{
      width:90px;
      margin-bottom:10px;
    }

    h1{
      color:#111827;
      margin-bottom:5px;
    }

    p{
      color:#6b7280;
      margin-bottom:25px;
      font-size:14px;
    }

    .input-box{
      width:100%;
      margin-bottom:18px;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#f1f5f9;
      font-size:15px;
      outline:none;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .signup-btn{
      background:#2563eb;
      color:white;
      margin-bottom:12px;
    }

    .signup-btn:hover{
      background:#1d4ed8;
    }

    .login-btn{
      background:#111827;
      color:white;
      margin-bottom:20px;
    }

    .login-btn:hover{
      background:#000;
    }

    .divider{
      display:flex;
      align-items:center;
      margin:20px 0;
    }

    .divider hr{
      flex:1;
      border:none;
      height:1px;
      background:#d1d5db;
    }

    .divider span{
      margin:0 10px;
      color:#6b7280;
      font-size:14px;
    }

    .google-btn{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #d1d5db;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
      font-weight:bold;
    }

    .google-btn:hover{
      background:#f8fafc;
    }

    .google-btn img{
      width:22px;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="img.png" class="logo">

    <h1>Welcome Back</h1>

    <p>Login to continue</p>

    <div class="input-box">
      <input type="email" id="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button class="btn signup-btn" id="signup">
      Create Account
    </button>

    <button class="btn login-btn" id="login">
      Login
    </button>

    <div class="divider">
      <hr>
      <span>OR</span>
      <hr>
    </div>

    <button class="google-btn" id="googleLogin">
      <img src="img.png">
      Continue with Google
    </button>

  </div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyAVt1-4OjuaWVKOxsTRfq-FUTc0e90QgYM",
  authDomain: "class3-31b16.firebaseapp.com",
  projectId: "class3-31b16",
  storageBucket: "class3-31b16.firebasestorage.app",
  messagingSenderId: "701922427075",
  appId: "1:701922427075:web:0374f014669751520f6276",
  measurementId: "G-F2T52Z1K48"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


// SIGNUP
document.getElementById("signup").addEventListener("click", () => {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)

  .then(() => {

    alert("Account Created Successfully");

    window.location.href = "welcome.html";

  })

  .catch((error) => {

    alert(error.message);

  });

});


// LOGIN
document.getElementById("login").addEventListener("click", () => {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)

  .then(() => {

    alert("Login Successful");

    window.location.href = "welcome.html";

  })

  .catch((error) => {

    alert(error.message);

  });

});


// GOOGLE LOGIN
document.getElementById("googleLogin").addEventListener("click", () => {

  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)

  .then(() => {

    window.location.href = "welcome.html";

  })

  .catch((error) => {

    alert(error.message);

  });

});

</script>

</body>
</html>
