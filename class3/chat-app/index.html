<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realtime Chat App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:95%;
      max-width:500px;
      background:#1e293b;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    .header{
      background:#2563eb;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .username-box{
      padding:20px;
      display:flex;
      gap:10px;
    }

    .username-box input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .username-box button{
      padding:12px 20px;
      border:none;
      background:#22c55e;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    .chat-section{
      display:none;
      flex-direction:column;
      height:600px;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:15px;
      background:#0f172a;
    }

    .message{
      margin-bottom:15px;
      padding:10px;
      border-radius:10px;
      background:#334155;
    }

    .message strong{
      color:#60a5fa;
    }

    .input-box{
      display:flex;
      padding:15px;
      gap:10px;
      background:#1e293b;
    }

    .input-box input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .input-box button{
      padding:12px 20px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    .typing{
      padding:10px 15px;
      font-size:14px;
      color:#94a3b8;
      background:#111827;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    Realtime Firebase Chat
  </div>

  <!-- Username Section -->
  <div class="username-box" id="usernameBox">
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="joinChat()">Join</button>
  </div>

  <!-- Chat Section -->
  <div class="chat-section" id="chatSection">

    <div class="messages" id="messages"></div>

    <div class="typing" id="typingStatus"></div>

    <div class="input-box">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Type message..."
        oninput="typingNow()"
      >
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script type="module">

  // Firebase Imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    set,
    onValue
  } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-database.js";

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAlIuzhG1K0zEqF8c7dWvY9yr-214yEpm8",
    authDomain: "class-2and3.firebaseapp.com",
    databaseURL: "https://class-2and3-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "class-2and3",
    storageBucket: "class-2and3.firebasestorage.app",
    messagingSenderId: "956789513098",
    appId: "1:956789513098:web:e4948646a14f3def9f0673",
    measurementId: "G-98GPMFW3B2"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = "";

  // Join Chat
  window.joinChat = function () {

    const username = document.getElementById("username").value.trim();

    if(username === ""){
      alert("Please enter username");
      return;
    }

    currentUser = username;

    document.getElementById("usernameBox").style.display = "none";
    document.getElementById("chatSection").style.display = "flex";

  }

  // Send Message
  window.sendMessage = function () {

    const messageInput = document.getElementById("messageInput");
    const message = messageInput.value.trim();

    if(message === "") return;

    push(ref(db, "messages"), {
      username: currentUser,
      message: message,
      time: new Date().toLocaleTimeString()
    });

    messageInput.value = "";

    set(ref(db, "typing"), "");
  }

  // Realtime Messages
  onChildAdded(ref(db, "messages"), (data) => {

    const chat = data.val();

    const messagesDiv = document.getElementById("messages");

    messagesDiv.innerHTML += `
      <div class="message">
        <strong>${chat.username}</strong><br>
        ${chat.message}
        <div style="font-size:12px;color:lightgray;margin-top:5px;">
          ${chat.time}
        </div>
      </div>
    `;

    messagesDiv.scrollTop = messagesDiv.scrollHeight;

  });

  // Typing Status
  window.typingNow = function () {

    set(ref(db, "typing"), currentUser + " is typing...");

  }

  // Listen Typing
  onValue(ref(db, "typing"), (snapshot) => {

    document.getElementById("typingStatus").innerText = snapshot.val();

  });

</script>

</body>
</html>
